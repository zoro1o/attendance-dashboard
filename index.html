<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AttendanceIQ — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-body">

  <!-- Animated grid background -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" fill="var(--accent)"/>
            <rect x="16" y="2" width="10" height="10" rx="2" fill="var(--accent)" opacity="0.5"/>
            <rect x="2" y="16" width="10" height="10" rx="2" fill="var(--accent)" opacity="0.5"/>
            <rect x="16" y="16" width="10" height="10" rx="2" fill="var(--accent)"/>
          </svg>
        </div>
        <span class="brand-name">AttendanceIQ</span>
      </div>

      <h1 class="login-title">Teacher Portal</h1>
      <p class="login-sub">Sign in to view your class attendance data</p>

      <form id="loginForm" class="login-form" autocomplete="off">
        <!-- Gmail field -->
        <div class="field-group">
          <label class="field-label" for="email">Gmail Address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
            <input type="email" id="email" placeholder="you@gmail.com" required autocomplete="username"/>
          </div>
        </div>

        <!-- Password field -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1" fill="currentColor"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password"/>
            <button type="button" class="toggle-pw" onclick="togglePw()" title="Show/Hide">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div class="error-box" id="errorBox">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorMsg"></span>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" id="btnLoader"></span>
        </button>
      </form>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
